# DEV profile
server.port=${SERVER_PORT:8090}

# Datasource (local docker postgres)
#spring.datasource.url=${POSTGRES_DOCKER_URL}
#spring.datasource.username=${POSTGRES_DOCKER_USER}
#spring.datasource.password=${POSTGRES_DOCKER_PASSWORD}

spring.datasource.url=${SUPABASE_URL}
spring.datasource.username=${SUPABASE_USER}
spring.datasource.password=${SUPABASE_PASSWORD}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.org.springframework=info
logging.level.org.hibernate.SQL=warn
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=trace

# CORS
app.cors.allowed-origin-patterns=http://localhost:3000,http://localhost:4200,http://127.0.0.1:3000,http://127.0.0.1:4200
