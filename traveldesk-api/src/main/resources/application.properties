spring.application.name=travel-desk-api
# =========================================
# APP SETTINGS (DEV)
# =========================================
server.port=8090
# =========================================
# DATASOURCE (LOCAL IDE -> POSTGRES IN DOCKER)
# =========================================
spring.datasource.url=${POSTGRES_DOCKER_URL:jdbc:postgresql://localhost:5467/<DB_NAME>}
spring.datasource.username=${POSTGRES_DOCKER_USER:<DB_USER>}
spring.datasource.password=${POSTGRES_DOCKER_PASSWORD:<DB_PASSWORD>}
spring.datasource.driver-class-name=org.postgresql.Driver
# =========================================
# JPA / HIBERNATE (DEV)
# =========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# =========================================
# LOGGING
# =========================================
logging.level.org.springframework=info
logging.level.org.hibernate.SQL=warn
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=trace
# =========================================
# Security JWT
# =========================================
#jwt.expiration=300000
#jwt.refresh-expiration=1800000
#jwt.secret_key=${SECRET_KEY}

