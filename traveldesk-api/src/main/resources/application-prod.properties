# PROD profile
server.port=${PORT:8080}

# Datasource (Railway)
# 1) Puedes definir SPRING_DATASOURCE_URL manualmente si lo prefieres.
# 2) Si no, se construye automáticamente con las variables PG* de Railway Postgres.
# 3) Para SSL en conexiones públicas, añade SPRING_DATASOURCE_URL_PARAMS (ej: ?sslmode=require).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:railway}${SPRING_DATASOURCE_URL_PARAMS:}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${PGUSER:postgres}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${PGPASSWORD:}}
# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL:false}
spring.jpa.open-in-view=false

# Logging
logging.level.org.springframework=info
logging.level.org.hibernate.SQL=warn
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=off

# API docs in prod
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# CORS
# En Railway conviene definir APP_CORS_ALLOWED_ORIGINS con tu dominio final de Vercel.
# Si quieres permitir previews, añade también https://*.vercel.app
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGINS:https://traveldesk-pi.vercel.app,https://travel-desk.vercel.app,https://*.vercel.app}
