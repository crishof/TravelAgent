# PROD profile
server.port=${PORT:8080}

# Datasource (Railway)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL:false}
spring.jpa.open-in-view=false

# Logging
logging.level.org.springframework=info
logging.level.org.hibernate.SQL=warn
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=off

# API docs in prod
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# CORS (Vercel + preview domains)
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGINS:https://travel-desk.vercel.app,https://*.vercel.app}
