# PROD profile
server.port=${PORT:8080}

# Datasource (Railway)
# 1) Soporta variables Spring explícitas si las defines manualmente.
# 2) Si no existen, usa las variables PG* que expone Railway Postgres.
# 3) Mantiene compatibilidad con SUPABASE_* como último fallback.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${PGHOST:${SUPABASE_HOST:localhost}}:${PGPORT:${SUPABASE_PORT:5432}}/${PGDATABASE:${SUPABASE_DB:postgres}}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${PGUSER:${SUPABASE_USER:postgres}}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${PGPASSWORD:${SUPABASE_PASSWORD:}}}
# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL:false}
spring.jpa.open-in-view=false

# Logging
logging.level.org.springframework=info
logging.level.org.hibernate.SQL=warn
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=off

# API docs in prod
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# CORS
# En Railway conviene definir APP_CORS_ALLOWED_ORIGINS con tu dominio final de Vercel.
# Si quieres permitir previews, añade también https://*.vercel.app
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGINS:https://travel-desk.vercel.app}
