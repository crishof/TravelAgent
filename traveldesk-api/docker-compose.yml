services:
  database:
    image: postgres:16
    container_name: travel-desk-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DOCKER_DB}
      POSTGRES_USER: ${POSTGRES_DOCKER_USER}
      POSTGRES_PASSWORD: ${POSTGRES_DOCKER_PASSWORD}
    ports:
      - "5467:5432"
    volumes:
      - pg_dev_data:/var/lib/postgresql/data
    networks:
      - travel-net

  spring:
    build: ./
    depends_on:
      - database
    env_file:
      - .env
    ports:
      - "8090:8090"
    networks:
      - travel-net

volumes:
  pg_dev_data:

networks:
  travel-net:
    driver: bridge