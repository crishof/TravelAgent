<div
  class="flex h-screen overflow-hidden bg-slate-100 dark:bg-slate-950 text-slate-900 dark:text-slate-100"
>
  <!-- ── Sidebar ─────────────────────────────────────────────────────────── -->
  <aside
    class="flex-shrink-0 flex flex-col transition-all duration-300 bg-white dark:bg-slate-900 border-r border-slate-200/80 dark:border-slate-800 shadow-sm"
    [style.width]="sidebarOpen() ? '232px' : '64px'"
  >
    <!-- Logo -->
    <div
      class="flex items-center gap-3 px-4 h-16 border-b border-slate-100 dark:border-slate-800 flex-shrink-0"
    >
      <div
        class="w-8 h-8 rounded-xl bg-gradient-to-br from-cyan-500 to-teal-600 flex items-center justify-center shadow-md flex-shrink-0"
      >
        <svg
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="white"
          stroke-width="1.8"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path
            d="M17.8 19.2L16 11l3.5-3.5C21 6 21 4 19 2c-2-2-4-2-5.5-.5L10 5 1.8 6.2c-.5.1-.9.6-.8 1.1l.6 2.4c.1.5.6.8 1.1.7l5.6-1.3 2.3 2.3-1.3 5.6c-.1.5.2 1 .7 1.1l2.4.6c.5.1 1-.3 1.1-.8z"
          />
        </svg>
      </div>
      @if (sidebarOpen()) {
        <div class="min-w-0">
          <div
            class="font-bold text-sm tracking-tight truncate text-slate-900 dark:text-white"
          >
            TravelDesk
          </div>
        </div>
      }
    </div>

    <!-- Navigation -->
    <nav class="flex-1 flex flex-col gap-0.5 px-2 py-3 overflow-y-auto">
      @for (item of visibleNav(); track item.path) {
        <a
          [routerLink]="['/app', item.path]"
          routerLinkActive="bg-gradient-to-r from-cyan-500/20 to-teal-500/10 text-cyan-400 border border-cyan-500/20"
          [routerLinkActiveOptions]="{ exact: false }"
          [title]="!sidebarOpen() ? item.label : ''"
          class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-800"
        >
          <span class="flex-shrink-0" [innerHTML]="item.icon | safeHtml"></span>
          @if (sidebarOpen()) {
            <span>{{ item.label }}</span>
          }
        </a>
      }
    </nav>

    <!-- User profile -->
    @if (sidebarOpen() && user()) {
      <div
        class="px-3 pb-4 border-t border-slate-100 dark:border-slate-800 pt-3"
      >
        <div
          class="flex items-center gap-2.5 p-2 rounded-xl bg-slate-50 dark:bg-slate-800"
        >
          <div
            class="w-8 h-8 rounded-full flex items-center justify-center text-white font-bold text-xs flex-shrink-0"
            [class]="
              user()!.role === 'ADMIN'
                ? 'bg-gradient-to-br from-violet-500 to-purple-600'
                : 'bg-gradient-to-br from-cyan-500 to-teal-600'
            "
          >
            {{ userInitials() }}
          </div>
          <div class="flex-1 min-w-0">
            <div
              class="text-xs font-semibold truncate text-slate-800 dark:text-slate-200"
            >
              {{ user()!.fullName }}
            </div>
            <span
              class="text-xs font-semibold px-1.5 py-0.5 rounded-full"
              [class]="
                user()!.role === 'ADMIN'
                  ? 'bg-violet-500/10 text-violet-500'
                  : 'bg-cyan-500/10 text-cyan-500'
              "
            >
              {{ user()!.role === "ADMIN" ? "Admin" : "Agente" }}
            </span>
          </div>
          <button
            (click)="logout()"
            class="p-1 rounded-lg hover:bg-red-500/20 text-slate-500 dark:text-slate-500 transition-colors"
            title="Cerrar sesión"
          >
            <svg
              width="13"
              height="13"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"
              />
            </svg>
          </button>
        </div>
      </div>
    }
  </aside>

  <!-- ── Main area ────────────────────────────────────────────────────────── -->
  <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
    <!-- Topbar -->
    <header
      class="flex items-center justify-between px-6 h-16 flex-shrink-0 border-b bg-white dark:bg-slate-900 border-slate-200/80 dark:border-slate-800 shadow-sm"
    >
      <button
        (click)="toggleSidebar()"
        class="p-2 rounded-lg transition-colors hover:bg-slate-50 dark:hover:bg-slate-800 text-slate-500 dark:text-slate-400"
      >
        <svg
          width="17"
          height="17"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
        >
          <line x1="3" y1="6" x2="21" y2="6" />
          <line x1="3" y1="12" x2="21" y2="12" />
          <line x1="3" y1="18" x2="21" y2="18" />
        </svg>
      </button>

      <div class="flex items-center gap-3">
        <span class="text-xs text-slate-500 dark:text-slate-500">{{
          theme.isDark() ? "Dark" : "Light"
        }}</span>
        <button
          (click)="theme.toggle()"
          class="relative w-11 h-6 rounded-full transition-all duration-300"
          [class]="theme.isDark() ? 'bg-cyan-500' : 'bg-slate-200'"
        >
          <div
            class="absolute top-0.5 w-5 h-5 rounded-full bg-white shadow transition-all duration-300 flex items-center justify-center"
            [class]="theme.isDark() ? 'translate-x-5' : 'translate-x-0.5'"
          >
            @if (theme.isDark()) {
              <svg
                width="10"
                height="10"
                viewBox="0 0 24 24"
                fill="none"
                stroke="#06b6d4"
                stroke-width="1.8"
                stroke-linecap="round"
              >
                <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
              </svg>
            } @else {
              <svg
                width="10"
                height="10"
                viewBox="0 0 24 24"
                fill="none"
                stroke="#f59e0b"
                stroke-width="1.8"
                stroke-linecap="round"
              >
                <circle cx="12" cy="12" r="5" />
                <line x1="12" y1="1" x2="12" y2="3" />
                <line x1="12" y1="21" x2="12" y2="23" />
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                <line x1="1" y1="12" x2="3" y2="12" />
                <line x1="21" y1="12" x2="23" y2="12" />
              </svg>
            }
          </div>
        </button>
      </div>
    </header>

    <!-- Exchange Rate Banner -->
    <app-exchange-rate-banner></app-exchange-rate-banner>

    <!-- Page content -->
    <main class="flex-1 overflow-y-auto p-6 animate-fade-in">
      <router-outlet />
    </main>
  </div>
</div>
