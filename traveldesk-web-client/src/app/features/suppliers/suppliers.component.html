<div class="flex flex-col gap-6 animate-fade-in">
  <div class="flex items-start justify-between">
    <div>
      <h1
        class="text-2xl font-bold tracking-tight text-slate-900 dark:text-white"
      >
        Proveedores
      </h1>
      <p class="text-sm mt-1 text-slate-500 dark:text-slate-400">
        {{ suppliersSvc.suppliers().length }} registrados
      </p>
    </div>
    <button
      (click)="showNew.set(true)"
      class="flex items-center gap-2 px-4 py-2.5 rounded-xl text-sm font-semibold text-white bg-gradient-to-r from-emerald-500 to-green-600 hover:opacity-90 transition-all shadow-lg shadow-emerald-500/20"
    >
      + Nuevo proveedor
    </button>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
    @for (p of suppliersSvc.suppliers(); track p.id) {
      <button
        (click)="selectSupplier(p.id)"
        (keydown.Enter)="selectSupplier(p.id)"
        class="w-full text-left rounded-2xl border p-5 hover:scale-[1.01] transition-all bg-white border-slate-100 shadow-sm dark:bg-slate-800/60 dark:border-slate-700/60 cursor-pointer hover:shadow-md focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:ring-offset-2"
        type="button"
      >
        <div class="flex items-center gap-3 mb-3">
          <div
            class="w-10 h-10 rounded-xl flex items-center justify-center text-white font-bold"
            [class]="catGradient(p.serviceType)"
          >
            {{ p.name[0] }}
          </div>
          <div>
            <div class="font-semibold text-slate-900 dark:text-white">
              {{ p.name }}
            </div>
            <div class="flex items-center gap-2 mt-0.5">
              <span
                class="text-xs px-2 py-0.5 rounded-full text-white font-medium"
                [class]="catGradient(p.serviceType)"
                >{{ serviceTypeLabels[p.serviceType] }}</span
              >
              <span
                class="text-xs font-bold"
                [class]="
                  p.currency === 'USD' ? 'text-cyan-500' : 'text-violet-500'
                "
              >
                {{ p.currency }}
              </span>
            </div>
          </div>
        </div>
        <div class="text-xs text-slate-500 dark:text-slate-400 space-y-1">
          @if (p.country) {
            <div>🌍 {{ p.country }}</div>
          }
          @if (p.email) {
            <div>✉️ {{ p.email }}</div>
          }
          @if (p.phone) {
            <div>📞 {{ p.phone }}</div>
          }
        </div>
      </button>
    }
  </div>
</div>

@if (showNew()) {
  <div
    class="fixed inset-0 z-50 flex items-center justify-center p-4"
    (click)="showNew.set(false)"
    (keydown.Enter)="showNew.set(false)"
  >
    <div class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
    <div
      class="relative w-full max-w-md rounded-2xl shadow-2xl border p-6 bg-white border-slate-200 dark:bg-slate-900 dark:border-slate-700 dark:text-slate-100"
      (click)="$event.stopPropagation()"
      (keydown)="$event.stopPropagation()"
    >
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-xl font-semibold">Nuevo proveedor</h2>
        <button
          (click)="showNew.set(false)"
          class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800"
        >
          ✕
        </button>
      </div>
      <form [formGroup]="form" (ngSubmit)="save()" class="flex flex-col gap-4">
        <div class="flex flex-col gap-1">
          <label
            class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400"
            >Nombre
            <input
              type="text"
              formControlName="name"
              placeholder="Marriott International"
              class="form-input form-input-light dark:form-input-dark"
            />
          </label>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div class="flex flex-col gap-1">
            <label
              class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400"
              >Tipo de Servicio
              <select
                formControlName="serviceType"
                class="form-input form-input-light dark:form-input-dark"
              >
                @for (cat of categories; track cat) {
                  <option [value]="cat">{{ serviceTypeLabels[cat] }}</option>
                }
              </select>
            </label>
          </div>
          <div class="flex flex-col gap-1">
            <label
              class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400"
              >Moneda
              <select
                formControlName="currency"
                class="form-input form-input-light dark:form-input-dark"
              >
                <option value="USD">USD</option>
                <option value="EUR">EUR</option>
              </select>
            </label>
          </div>
        </div>
        <div class="flex flex-col gap-1">
          <label
            class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400"
            >País
            <input
              type="text"
              formControlName="country"
              placeholder="USA"
              class="form-input form-input-light dark:form-input-dark"
            />
          </label>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div class="flex flex-col gap-1">
            <label
              class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400"
              >Email
              <input
                type="email"
                formControlName="email"
                placeholder="b2b@proveedor.com"
                class="form-input form-input-light dark:form-input-dark"
              />
            </label>
          </div>
          <div class="flex flex-col gap-1">
            <label
              class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400"
              >Teléfono
              <input
                type="tel"
                formControlName="phone"
                placeholder="+34 123 456 789"
                class="form-input form-input-light dark:form-input-dark"
              />
            </label>
          </div>
        </div>
        <button
          type="submit"
          class="w-full py-3 rounded-xl bg-gradient-to-r from-emerald-500 to-green-600 text-white font-semibold text-sm hover:opacity-90 transition-all mt-1"
        >
          Guardar proveedor
        </button>
      </form>
    </div>
  </div>
}
