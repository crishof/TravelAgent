<div class="flex flex-col gap-6 animate-fade-in">
  <div>
    <h1
      class="text-2xl font-bold tracking-tight text-slate-900 dark:text-white"
    >
      Mi cuenta
    </h1>
    <p class="text-sm mt-1 text-slate-500 dark:text-slate-400">
      Información de tu perfil
    </p>
  </div>

  <!-- Profile card -->
  <div
    class="flex items-center gap-4 p-5 rounded-2xl border bg-white border-slate-100 shadow-sm dark:bg-slate-800/60 dark:border-slate-700/60"
  >
    <div
      class="w-14 h-14 rounded-2xl flex items-center justify-center text-white font-bold text-xl"
      [class]="
        user()!.role === 'ADMIN'
          ? 'bg-gradient-to-br from-violet-500 to-purple-600'
          : 'bg-gradient-to-br from-cyan-500 to-teal-600'
      "
    >
      {{
        (user()!.email.charAt(0) || "") +
          (user()!.email.split(".").at(1)?.charAt(0) || "")
      }}
    </div>
    <div class="flex-1">
      <div class="text-lg font-bold text-slate-900 dark:text-white">
        {{ user()!.fullName }}
      </div>
      <div class="text-sm text-slate-500 dark:text-slate-400">
        {{ user()!.email }}
      </div>
      <div class="mt-1 text-xs text-slate-400 dark:text-slate-500 font-mono">
        ID: {{ user()!.id }}
      </div>
      <span
        class="text-xs font-semibold px-2 py-0.5 rounded-full mt-1 inline-block"
        [class]="
          user()!.role === 'ADMIN'
            ? 'bg-violet-500/10 text-violet-500'
            : 'bg-cyan-500/10 text-cyan-500'
        "
      >
        {{ user()!.role === "ADMIN" ? "Admin" : "Agente" }}
      </span>
      <span
        class="ml-2 text-xs font-semibold px-2 py-0.5 rounded-full mt-1 inline-block"
        [class]="
          user()!.status === 'ACTIVE'
            ? 'bg-emerald-500/10 text-emerald-500'
            : 'bg-amber-500/10 text-amber-500'
        "
      >
        {{ user()!.status }}
      </span>
    </div>
  </div>

  <app-account-statement></app-account-statement>
</div>
