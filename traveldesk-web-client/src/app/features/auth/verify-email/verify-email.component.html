<div
  class="min-h-screen flex items-center justify-center relative overflow-hidden bg-gradient-to-br from-slate-50 via-cyan-50 to-slate-100 dark:bg-slate-950 dark:from-slate-950 dark:via-slate-950 dark:to-slate-950"
>
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div
      class="absolute -top-40 -right-40 w-96 h-96 rounded-full blur-3xl bg-cyan-400/20 dark:bg-cyan-500/10"
    ></div>
    <div
      class="absolute -bottom-40 -left-40 w-96 h-96 rounded-full blur-3xl bg-teal-400/20 dark:bg-teal-500/10"
    ></div>
  </div>

  <div
    class="relative w-full max-w-md mx-4 rounded-3xl border p-8 shadow-2xl bg-white border-slate-100 dark:bg-slate-900 dark:border-slate-700"
  >
    <div class="flex items-center gap-3 mb-6">
      <div
        class="w-10 h-10 rounded-2xl bg-gradient-to-br from-cyan-500 to-teal-600 flex items-center justify-center shadow-lg"
      >
        <svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="white"
          stroke-width="1.8"
          stroke-linecap="round"
        >
          <path
            d="M17.8 19.2L16 11l3.5-3.5C21 6 21 4 19 2c-2-2-4-2-5.5-.5L10 5 1.8 6.2c-.5.1-.9.6-.8 1.1l.6 2.4c.1.5.6.8 1.1.7l5.6-1.3 2.3 2.3-1.3 5.6c-.1.5.2 1 .7 1.1l2.4.6c.5.1 1-.3 1.1-.8z"
          />
        </svg>
      </div>
      <div>
        <h1 class="text-xl font-bold text-slate-900 dark:text-white">
          Verificar email
        </h1>
        <p class="text-xs text-slate-500 dark:text-slate-400">
          Ingresá el código de 6 dígitos enviado a tu correo.
        </p>
      </div>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-4">
      <div class="flex flex-col gap-1">
        <label
          class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400"
          >Email
          <input
            type="email"
            formControlName="email"
            placeholder="tu@agencia.com"
            class="form-input form-input-light dark:form-input-dark"
          />
        </label>
      </div>

      <div class="flex flex-col gap-1">
        <label
          class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400"
          >Código de verificación
          <input
            type="text"
            formControlName="code"
            inputmode="numeric"
            maxlength="6"
            placeholder="123456"
            class="form-input form-input-light dark:form-input-dark tracking-[0.35em]"
          />
        </label>
      </div>

      @if (error()) {
        <p class="text-xs text-red-400 bg-red-400/10 px-3 py-2 rounded-lg">
          {{ error() }}
        </p>
      }

        @if (resendSuccess()) {
          <p class="text-xs text-emerald-500 bg-emerald-400/10 px-3 py-2 rounded-lg">
            {{ resendSuccess() }}
          </p>
        }

      <button
        type="submit"
        [disabled]="loading()"
        class="w-full py-3 rounded-xl bg-gradient-to-r from-cyan-500 to-teal-600 text-white font-semibold text-sm hover:opacity-90 transition-all shadow-lg shadow-cyan-500/25 disabled:opacity-60 disabled:cursor-not-allowed"
      >
        {{ loading() ? "Verificando..." : "Verificar y entrar" }}
      </button>

        <button
          type="button"
          (click)="resendCode()"
          [disabled]="resendLoading()"
          class="w-full py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 text-sm font-medium text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors disabled:opacity-60 disabled:cursor-not-allowed"
        >
          {{ resendLoading() ? "Enviando..." : "Reenviar código" }}
        </button>
    </form>

    <div
      class="mt-6 pt-5 border-t border-slate-100 dark:border-slate-800 text-center text-sm text-slate-400 dark:text-slate-500"
    >
      ¿Ya tenés sesión?
      <a
        routerLink="/auth/login"
        class="text-cyan-500 hover:underline font-medium ml-1"
      >
        Volver al login
      </a>
    </div>
  </div>
</div>
