<div
  class="min-h-screen flex items-center justify-center relative overflow-hidden bg-gradient-to-br from-slate-50 via-cyan-50 to-slate-100 dark:bg-slate-950 dark:from-slate-950 dark:via-slate-950 dark:to-slate-950"
>
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div
      class="absolute -top-44 -right-44 w-96 h-96 rounded-full blur-3xl bg-cyan-400/20 dark:bg-cyan-500/10"
    ></div>
    <div
      class="absolute -bottom-44 -left-44 w-96 h-96 rounded-full blur-3xl bg-teal-400/20 dark:bg-teal-500/10"
    ></div>
  </div>

  <div
    class="relative w-full max-w-md mx-4 rounded-3xl border p-8 shadow-2xl bg-white border-slate-100 dark:bg-slate-900 dark:border-slate-700"
  >
    <h1 class="text-2xl font-bold text-slate-900 dark:text-white">
      Nueva contraseña
    </h1>
    <p class="text-sm mt-1 mb-6 text-slate-500 dark:text-slate-400">
      Elegí una nueva contraseña segura para tu cuenta.
    </p>

    <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-4">
      <div class="flex flex-col gap-1">
        <label
          class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400"
          >Token de recuperación
          <input
            type="text"
            formControlName="token"
            placeholder="Token recibido por email"
            class="form-input form-input-light dark:form-input-dark"
          />
        </label>
      </div>

      <div class="flex flex-col gap-1">
        <label
          class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400"
          >Nueva contraseña
          <input
            type="password"
            formControlName="newPassword"
            placeholder="Mínimo 8 caracteres"
            class="form-input form-input-light dark:form-input-dark"
          />
        </label>
      </div>

      <div class="flex flex-col gap-1">
        <label
          class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400"
          >Confirmar nueva contraseña
          <input
            type="password"
            formControlName="confirmPassword"
            placeholder="Repetir contraseña"
            class="form-input form-input-light dark:form-input-dark"
          />
        </label>
      </div>

      <p class="text-xs text-slate-500 dark:text-slate-400">
        Debe contener mayúscula, minúscula, número y caracter especial.
      </p>

      @if (error()) {
        <p class="text-xs text-red-400 bg-red-400/10 px-3 py-2 rounded-lg">
          {{ error() }}
        </p>
      }

      @if (successMessage()) {
        <p class="text-xs text-emerald-600 bg-emerald-500/10 px-3 py-2 rounded-lg">
          {{ successMessage() }}
        </p>
      }

      <button
        type="submit"
        [disabled]="loading()"
        class="w-full py-3 rounded-xl bg-gradient-to-r from-cyan-500 to-teal-600 text-white font-semibold text-sm hover:opacity-90 transition-all shadow-lg shadow-cyan-500/25 disabled:opacity-60 disabled:cursor-not-allowed"
      >
        {{ loading() ? "Actualizando..." : "Actualizar contraseña" }}
      </button>
    </form>

    <div
      class="mt-6 pt-5 border-t border-slate-100 dark:border-slate-800 text-center text-sm text-slate-400 dark:text-slate-500"
    >
      <a
        routerLink="/auth/login"
        class="text-cyan-500 hover:underline font-medium"
      >
        Volver al login
      </a>
    </div>
  </div>
</div>
