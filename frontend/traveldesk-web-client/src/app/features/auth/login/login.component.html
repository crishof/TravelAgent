<div
  class="min-h-screen flex items-center justify-center relative overflow-hidden bg-gradient-to-br from-slate-50 via-cyan-50 to-slate-100 dark:bg-slate-950 dark:from-slate-950 dark:via-slate-950 dark:to-slate-950"
>
  <!-- Background blobs -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div
      class="absolute -top-40 -right-40 w-96 h-96 rounded-full blur-3xl bg-cyan-400/20 dark:bg-cyan-500/10"
    ></div>
    <div
      class="absolute -bottom-40 -left-40 w-96 h-96 rounded-full blur-3xl bg-teal-400/20 dark:bg-teal-500/10"
    ></div>
  </div>

  <div
    class="relative w-full max-w-md mx-4 rounded-3xl border p-8 shadow-2xl bg-white border-slate-100 dark:bg-slate-900 dark:border-slate-700"
  >
    <!-- Header -->
    <div class="flex items-center justify-between mb-8">
      <div class="flex items-center gap-3">
        <div
          class="w-10 h-10 rounded-2xl bg-gradient-to-br from-cyan-500 to-teal-600 flex items-center justify-center shadow-lg"
        >
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="white"
            stroke-width="1.8"
            stroke-linecap="round"
          >
            <path
              d="M17.8 19.2L16 11l3.5-3.5C21 6 21 4 19 2c-2-2-4-2-5.5-.5L10 5 1.8 6.2c-.5.1-.9.6-.8 1.1l.6 2.4c.1.5.6.8 1.1.7l5.6-1.3 2.3 2.3-1.3 5.6c-.1.5.2 1 .7 1.1l2.4.6c.5.1 1-.3 1.1-.8z"
            />
          </svg>
        </div>
        <div>
          <div
            class="font-bold text-lg tracking-tight text-slate-900 dark:text-white"
          >
            TravelDesk
          </div>
          <div class="text-xs text-slate-500 dark:text-slate-400">
            Gestión de Ventas
          </div>
        </div>
      </div>
      <button
        (click)="theme.toggle()"
        class="p-2 rounded-xl transition-colors bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-amber-400"
      >
        @if (theme.isDark()) {
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
          >
            <circle cx="12" cy="12" r="5" />
            <line x1="12" y1="1" x2="12" y2="3" />
            <line x1="12" y1="21" x2="12" y2="23" />
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
            <line x1="1" y1="12" x2="3" y2="12" />
            <line x1="21" y1="12" x2="23" y2="12" />
          </svg>
        } @else {
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
          >
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
          </svg>
        }
      </button>
    </div>

    <h2 class="text-2xl font-bold mb-1 text-slate-900 dark:text-white">
      Bienvenido
    </h2>
    <p class="text-sm mb-6 text-slate-500 dark:text-slate-400">
      Ingresá con tu cuenta
    </p>

    <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-4">
      <div class="flex flex-col gap-1">
        <label
          class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400"
          >Email
          <input
            type="email"
            formControlName="email"
            placeholder="tu@agencia.com"
            class="form-input form-input-light dark:form-input-dark"
            [class.ring-2]="
              form.get('email')?.invalid && form.get('email')?.touched
            "
            [class.ring-red-400]="
              form.get('email')?.invalid && form.get('email')?.touched
            "
          />
        </label>
      </div>

      <div class="flex flex-col gap-1">
        <label
          class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400"
          >Contraseña
          <input
            type="password"
            formControlName="password"
            placeholder="••••••••"
            class="form-input form-input-light dark:form-input-dark"
          />
        </label>
      </div>

      @if (error()) {
        <p class="text-xs text-red-400 bg-red-400/10 px-3 py-2 rounded-lg">
          {{ error() }}
        </p>
      }

      <button
        type="submit"
        [disabled]="loading()"
        class="mt-1 w-full py-3 rounded-xl bg-gradient-to-r from-cyan-500 to-teal-600 text-white font-semibold text-sm hover:opacity-90 transition-all shadow-lg shadow-cyan-500/25 disabled:opacity-60 disabled:cursor-not-allowed"
      >
        {{ loading() ? "Ingresando..." : "Iniciar sesión" }}
      </button>
    </form>

    <div
      class="mt-6 pt-5 border-t border-slate-100 dark:border-slate-800 text-center text-sm text-slate-400 dark:text-slate-500"
    >
      ¿Sin agencia?
      <a
        routerLink="/auth/register"
        class="text-cyan-500 hover:underline font-medium ml-1"
      >
        Crear nueva agencia
      </a>
    </div>
  </div>
</div>
